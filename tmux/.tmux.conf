# =============================================================================
# tmux 配置文件
# =============================================================================

# -----------------------------------------------------------------------------
# 基础设置
# -----------------------------------------------------------------------------

# 设置前缀键为 Ctrl+a（比默认的 Ctrl+b 更容易按）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 设置快捷键重载配置
bind r source-file ~/.tmux.conf \; display "配置已重载！"

# 启用鼠标支持
set -g mouse on

# 设置历史滚动行数
set -g history-limit 10000

# 设置窗口和面板索引从 1 开始（0 离前缀键太远）
set -g base-index 1
setw -g pane-base-index 1

# 重新编号窗口（关闭窗口后自动重新编号）
set -g renumber-windows on

# 设置终端颜色支持
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 设置状态栏更新间隔
set -g status-interval 5

# 启用焦点事件
set -g focus-events on

# 设置窗口活动监控
setw -g monitor-activity on
set -g visual-activity off

# -----------------------------------------------------------------------------
# 窗口和面板管理
# -----------------------------------------------------------------------------

# 使用 | 和 - 分割窗口（更直观）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 使用 Vim 风格的方向键在面板间移动
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 使用 Alt+方向键快速切换面板（无需前缀键）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 Shift+方向键切换窗口（无需前缀键）
bind -n S-Left previous-window
bind -n S-Right next-window

# 调整面板大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 快速创建新窗口
bind c new-window -c "#{pane_current_path}"

# 快速关闭窗口和面板
bind x kill-pane
bind X kill-window

# 同步面板输入（同时向所有面板发送命令）
bind y setw synchronize-panes \; display "同步模式: #{?synchronize-panes,开启,关闭}"

# -----------------------------------------------------------------------------
# 复制模式（Vim 风格）
# -----------------------------------------------------------------------------

# 使用 Vim 风格的复制模式
setw -g mode-keys vi

# 进入复制模式
bind Escape copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 使用系统剪贴板（macOS 和 Linux 兼容）
if-shell "uname | grep -q Darwin" {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
}

# -----------------------------------------------------------------------------
# 状态栏样式
# -----------------------------------------------------------------------------

# 启用状态栏
set -g status on

# 状态栏位置
set -g status-position bottom

# 状态栏背景色和前景色
set -g status-style bg=colour235,fg=colour250

# 左侧状态栏：会话名
set -g status-left "#[bg=colour235,fg=colour2] #S #[default]"
set -g status-left-length 40

# 右侧状态栏：时间、日期、主机名
set -g status-right "#[bg=colour235,fg=colour6] %H:%M #[bg=colour235,fg=colour3] %Y-%m-%d #[bg=colour235,fg=colour5] #h #[default]"
set -g status-right-length 100

# 窗口状态样式
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=colour240,fg=colour15,bold] #I:#W #[default]"
setw -g window-status-separator ""

# -----------------------------------------------------------------------------
# 其他设置
# -----------------------------------------------------------------------------

# 自动重命名窗口（根据当前运行的程序）
setw -g automatic-rename on

# 设置窗口标题
set -g set-titles on
set -g set-titles-string "#S: #W"

# 延长消息显示时间
set -g display-time 2000

# 设置转义时间（提高 Vim 响应速度）
set -sg escape-time 10

# 允许更快的按键重复
set -g repeat-time 600
